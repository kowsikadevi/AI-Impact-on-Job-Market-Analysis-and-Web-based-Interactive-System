<!DOCTYPE html>
<html>
<head>
    <title>AI Impact Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">

    <div class="top-title">AI Impact Analyzer</div>

    <input id="username" class="box" placeholder="Enter Username">

    <select id="industry" class="box">
        <option value="">Select Industry</option>
        <option>General Business</option>
        <option>Administrative & Office Support</option>
        <option>Healthcare</option>
        <option>Manufacturing & Labor</option>
        <option>Logistics & Supply Chain</option>
        <option>Information Technology</option>
        <option>Sales & Marketing</option>
        <option>Finance & Banking</option>
        <option>Public Safety & Government</option>
        <option>Architecture & Engineering</option>
        <option>Media & Entertainment</option>
        <option>Insurance</option>
        <option>Education</option>
    </select>

    <button id="continueBtn" class="btn-disabled" disabled>
        Continue
    </button>

</div>

<script src="app.js"></script>
</body>
</html>
